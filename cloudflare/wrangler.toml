name = "x402agentic-firewall"
main = "src/worker.ts"
compatibility_date = "2025-09-01"   # >= 2025-09 exposes Buffer global (needed by @coinbase/x402)
compatibility_flags = ["nodejs_compat"]

# Custom domain (requires x402agentic.ai to be a zone in this Cloudflare account).
routes = [
  { pattern = "api.x402agentic.ai", custom_domain = true }
]

[vars]
PRICE_USDC = "0.10"
# NETWORK_CAIP2 defaults to Base mainnet (eip155:8453) in code; override here if needed.
# NETWORK_CAIP2 = "eip155:8453"

# Secrets (encrypted — set with `wrangler secret put`, never commit):
#   wrangler secret put PAY_TO
#   wrangler secret put CDP_API_KEY_ID
#   wrangler secret put CDP_API_KEY_SECRET

# Denylist storage (OFAC sanctioned addresses + your own additions).
# Create it:  npx wrangler kv namespace create RISK_KV
# then paste the returned id below and uncomment:
[[kv_namespaces]]
binding = "RISK_KV"
id = "6336ff3a2e3b4c4f832ccbaa3ec19c0b"

# Auto-refresh the denylist weekly (Mondays 06:00 UTC).
[triggers]
crons = ["0 6 * * 1"]