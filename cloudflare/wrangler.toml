name = "x402agentic-firewall"
main = "src/worker.ts"
compatibility_date = "2025-09-01"   # >= 2025-09 exposes Buffer global (needed by @coinbase/x402)
compatibility_flags = ["nodejs_compat"]

# Serve the Worker on your own domain. Requires x402agentic.ai to be a zone
# in this same Cloudflare account. `custom_domain = true` makes Cloudflare
# create the DNS record + TLS cert automatically on `wrangler deploy`.
routes = [
  { pattern = "api.x402agentic.ai", custom_domain = true }
]

[vars]
PRICE_USDC = "0.001"
NETWORK = "base"          # "base" = mainnet (CDP facilitator) | "base-sepolia" = testnet (x402.org)

# Set these as SECRETS, not vars (encrypted, never in your repo):
#   wrangler secret put PAY_TO
#   wrangler secret put CDP_API_KEY_ID
#   wrangler secret put CDP_API_KEY_SECRET
